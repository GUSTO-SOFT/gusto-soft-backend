services:
  - type: web
    name: gusto-soft-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 17314
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_SYNC
        value: false
      - key: DB_MIGRATIONS_RUN
        value: true
      - key: DB_SSL
        value: true
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: DB_SSL_CA
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: INITIAL_ADMIN_NAME
        sync: false
      - key: VERIFICATION_CODE_EXPIRATION_MINUTES
        value: 10
      - key: PENDING_USERS_RETENTION_DAYS
        value: 7
      - key: USER_CLEANUP_DISABLED
        value: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_DISABLED
        value: false
